name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (FeatureAuth-Dev)
    runs-on: macos-15
    timeout-minutes: 45

    env:
      SCHEME: ScriptStarter
      TEST_PLAN: ScriptStarter
      # Pick a stable, widely-available simulator. Adjust the OS if the
      # runner image ships a different iOS Simulator runtime.
      DESTINATION: "platform=iOS Simulator,name=iPhone 16,OS=latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install tooling (XcodeGen + SwiftLint)
        run: |
          brew install xcodegen swiftlint

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ScriptStarter.xcodeproj \
            -scheme "$SCHEME"

      - name: Run app + local package tests (Test Plan)
        run: |
          set -o pipefail
          xcodebuild test \
            -project ScriptStarter.xcodeproj \
            -scheme "$SCHEME" \
            -testPlan "$TEST_PLAN" \
            -destination "$DESTINATION" \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: TestResults.xcresult
          if-no-files-found: ignore
